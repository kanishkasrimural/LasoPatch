<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Laso Patch</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: var(--white);
        }
        .auth-wrapper {
            display: flex;
            min-height: 100vh;
        }
        .auth-image-side {
            flex: 1;
            display: none;
            background-image: url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .auth-image-side::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.4));
        }
        .auth-image-text {
            position: absolute;
            bottom: 4rem;
            left: 4rem;
            color: var(--white);
            z-index: 2;
            max-width: 80%;
        }
        .auth-image-text h2 {
            font-size: 3rem;
            color: var(--white);
            margin-bottom: 1rem;
        }
        .auth-form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
            background-color: var(--bg-color);
        }
        @media (min-width: 992px) {
            .auth-image-side {
                display: block;
            }
        }
        .auth-card {
            background-color: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(61, 90, 46, 0.05);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .auth-logo {
            margin-bottom: 2rem;
            justify-content: center;
        }
        .auth-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .auth-card p {
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-dark);
            font-size: 0.9rem;
        }
        .form-control {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 1px solid rgba(61, 90, 46, 0.2);
            border-radius: 12px;
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            outline: none;
            transition: var(--transition);
        }
        .form-control:focus {
            border-color: var(--primary-color);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(61, 90, 46, 0.1);
        }
        .auth-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
        }
        .auth-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
        }
        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dark);
            font-weight: 500;
            z-index: 2;
        }
        .back-home:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-image-side">
            <a href="index.html" class="back-home" style="color: white; left: 4rem; top: 3rem;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            <div class="auth-image-text">
                <h2>Return to Nature</h2>
                <p style="font-size: 1.2rem; color: rgba(255,255,255,0.9);">Manage your orders and subscribe to natural healing delivered straight to your door.</p>
            </div>
        </div>

        <div class="auth-form-side">
            <a href="index.html" class="back-home" style="display: none;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
            <div class="auth-card">
                <a href="index.html" class="logo auth-logo"><img src="Untitled_design-removebg-preview.png" alt="Laso Patch Logo" class="logo-img"> Laso<span class="logo-patch">Patch</span></a>
                <h2>Welcome Back</h2>
                <p>Sign in to your account to manage orders.</p>

                <form action="#" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <label class="form-label" for="password" style="margin-bottom: 0;">Password</label>
                            <a href="#" style="font-size: 0.8rem;">Forgot password?</a>
                        </div>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary auth-btn">Sign In</button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="#" style="font-weight: 600;">Sign up</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
